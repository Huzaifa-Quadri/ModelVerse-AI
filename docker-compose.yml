services:
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - frontend_node_modules:/app/node_modules #Using named volumes prevent the host node_modules from overwriting the container's node_modules
      #instead of --> - /app/node_modules
    command: npm run dev

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    env_file:
      - ./backend/.env
    command: npx nodemon --legacy-watch server.js

volumes:
  mongodb_data:
  frontend_node_modules: # Added here because of using named volumes (anonymous volume doesnot need this.)
  backend_node_modules: # Added here because of using named volumes (anonymous volume doesnot need this.)
